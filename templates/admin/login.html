{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f4f6f9;
            font-family: Arial, sans-serif;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            background-color: #fff;
        }

        .toggle-password {
            cursor: pointer;
        }

        .dark-theme {
            background-color: #1e1e2f;
            color: #f4f4f4;
        }

        .dark-theme .login-card {
            background-color: #2c2c3e;
            color: #f4f4f4;
        }

        .dark-theme input {
            background-color: #3a3a4e;
            color: #f4f4f4;
        }

        .dark-theme button {
            background-color: #0d6efd;
        }

    </style>
</head>
<body>

<div class="login-card">
    <h3 class="text-center mb-4">Login</h3>

    {% if form.errors %}
    <div class="alert alert-danger">
        {% for field in form %}
            {% for error in field.errors %}
                <div>{{ error }}</div>
            {% endfor %}
        {% endfor %}
        {% for error in form.non_field_errors %}
            <div>{{ error }}</div>
        {% endfor %}
    </div>
    {% endif %}

    <form method="post" autocomplete="off">
        {% csrf_token %}

        <!-- Hidden fake fields to prevent Chrome autofill -->
        <input type="text" name="fakeusernameremembered" style="display:none">
        <input type="password" name="fakepasswordremembered" style="display:none">

        <div class="mb-3">
            <label for="id_username" class="form-label">Username</label>
            <input type="text" class="form-control" id="id_username" name="username" autocomplete="new-password" required>
        </div>

        <div class="mb-3 position-relative">
            <label for="id_password" class="form-label">Password</label>
            <input type="password" class="form-control" id="id_password" name="password" autocomplete="new-password" required>
            <span class="position-absolute top-50 end-0 translate-middle-y me-3 toggle-password">👁️</span>
        </div>

        <button type="submit" class="btn btn-primary w-100">Login</button>

        <div class="form-check mt-3">
            <input class="form-check-input" type="checkbox" id="darkModeToggle">
            <label class="form-check-label" for="darkModeToggle">Dark Mode</label>
        </div>
    </form>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Show/hide password
    document.querySelector('.toggle-password').addEventListener('click', function() {
        const pwd = document.getElementById('id_password');
        if (pwd.type === 'password') {
            pwd.type = 'text';
            this.textContent = '🙈';
        } else {
            pwd.type = 'password';
            this.textContent = '👁️';
        }
    });

    // Dark mode toggle
    document.getElementById('darkModeToggle').addEventListener('change', function() {
        document.body.classList.toggle('dark-theme', this.checked);
    });
</script>

</body>
</html>
